name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Check out the repository
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Create required test directories
      run: mkdir -p CoreJava_Project/src/test/files

    - name: Display Java version
      run: |
        echo "=========================================="
        echo "Java Version Information"
        echo "=========================================="
        java -version
        javac -version
        echo "=========================================="

    - name: Build and run tests with Maven (Verbose Output)
      run: |
        echo "=========================================="
        echo "Starting Maven Build and Tests"
        echo "=========================================="
        mvn -f CoreJava_Project/pom.xml clean test -Dverbose
        echo "=========================================="
      continue-on-error: true

    - name: Display Test Results
      if: always()
      run: |
        echo "=========================================="
        echo "Test Execution Summary"
        echo "=========================================="
        if [ -d "CoreJava_Project/target/surefire-reports" ]; then
          echo "Test Reports Found:"
          ls -la CoreJava_Project/target/surefire-reports/
          echo ""
          echo "Test Output:"
          find CoreJava_Project/target/surefire-reports -name "*.txt" -exec cat {} \;
        else
          echo "No test reports directory found"
        fi
        echo "=========================================="

    - name: Generate Surefire HTML report
      run: |
        echo "=========================================="
        echo "Generating HTML Test Report"
        echo "=========================================="
        mvn -f CoreJava_Project/pom.xml surefire-report:report-only site:attach-descriptor -Dverbose
        echo "=========================================="
      continue-on-error: true

    - name: Display Build Summary
      if: always()
      run: |
        echo "=========================================="
        echo "Build and Test Artifacts"
        echo "=========================================="
        if [ -d "CoreJava_Project/target" ]; then
          echo "Target directory contents:"
          ls -lh CoreJava_Project/target/ | head -20
        fi
        echo "=========================================="

    - name: Upload test report as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-report
        path: CoreJava_Project/target/site/

    - name: Upload surefire reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: surefire-reports
        path: CoreJava_Project/target/surefire-reports/