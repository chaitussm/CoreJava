name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Check out the repository
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Create required test directories
      run: mkdir -p CoreJava_Project/src/test/files

    - name: Build and run tests with Maven
      run: mvn -f CoreJava_Project/pom.xml clean test --no-transfer-progress
      continue-on-error: true

    - name: Generate Surefire HTML report
      run: mvn -f CoreJava_Project/pom.xml surefire-report:report-only site:attach-descriptor --no-transfer-progress
      continue-on-error: true

    - name: Upload test report as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-report
        path: CoreJava_Project/target/site/

    - name: Send email with test report
      uses: dawidd6/action-send-mail@v3
      if: always()
      with:
        server_address: smtp.gmail.com
        server_port: 587
        secure: false
        tls: true
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "CoreJava Test Report - ${{ github.ref_name }} - Run #${{ github.run_number }}"
        to: chaitanyassm@outlook.com
        from: qaengine252@gmail.com
        body: |
          CoreJava Test Execution Report

          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Run: ${{ github.run_number }}

          The HTML test report is available as a GitHub Actions artifact at:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please download the artifact named 'test-report' for the full HTML report.
        attachments: CoreJava_Project/target/site/surefire-report.html
