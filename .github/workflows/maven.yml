name: Java CI with Maven\n\non: [push]\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n    - name: Check out the repository\n      uses: actions/checkout@v2\n    - name: Set up JDK 11\n      uses: actions/setup-java@v1\n      with:\n        java-version: '11'\n    - name: Build with Maven\n      run: mvn -f CoreJava_Project/pom.xml clean install